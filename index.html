<!DOCTYPE html>
<html>
<head>
<title>ROBe</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:20px;
}

#chat{
max-width:400px;
margin:auto;
background:#1e1e1e;
padding:10px;
border-radius:10px;
}

#messages{
height:300px;
overflow:auto;
text-align:left;
margin-bottom:10px;
}

input{
width:70%;
padding:8px;
}

button{
padding:8px;
}
</style>
</head>

<body>

<h2>ROBe 🤖</h2>
<p>Il tuo compagno AI</p>

<div id="chat">

<div id="messages"></div>

<input id="input" placeholder="Scrivi qualcosa...">
<button onclick="send()">Invia</button>

</div>

<script>

function send(){

let input=document.getElementById("input")
let text=input.value

if(text=="") return

add("Tu: "+text)

input.value=""

setTimeout(()=>{
reply(text)
},500)

}

function add(text){

let div=document.createElement("div")
div.innerText=text

document.getElementById("messages").appendChild(div)

}

function reply(text){

text=text.toLowerCase()

let response="Non ho capito 🤔"

if(text.includes("ciao"))
response="Ciao! Sono ROBe 🤖"

else if(text.includes("come stai"))
response="Sto bene! Sono qui con te."

else if(text.includes("triste"))
response="Mi dispiace... vuoi parlarne?"

else if(text.includes("solo"))
response="Possiamo parlare insieme."

else if(text.includes("chi sei"))
response="Sono ROBe, il tuo compagno."

add("ROBe: "+response)

}

</script>

</body>
  </html>
